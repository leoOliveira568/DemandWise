[build]
  base = "dashboard"
  command = "npm install && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# SPA-style fallback: serve index.html for any path that doesn't match a file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
